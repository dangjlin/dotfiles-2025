# ============================================================================
# LazyDocker Configuration
# ============================================================================
# Configuration for LazyDocker terminal UI for Docker:
# - GUI: Return immediately after command execution
# - Custom commands:
#   * "rails console >" : Open Rails console in container
#   * "attach >" : Attach to container with custom detach key (Ctrl-D)
# ============================================================================

gui:
  returnImmediately: true

customCommands:
  containers:
    - name: "rails console >"
      attach: true
      command: 'docker exec -it {{ .Container.ID }} bundle exec rails c'
      serviceNames: []
    - name: "attach        >"
      attach: true
      command: 'docker attach --sig-proxy=false --detach-keys=ctrl-d {{ .Container.ID }}'
      serviceNames: []
